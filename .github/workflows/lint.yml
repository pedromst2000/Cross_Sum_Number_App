name: Lint Code Quality

"on":
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  lint-code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/dev-requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r dev-requirements.txt
          pip install black

      - name: Check code formatting with Black
        run: |
          if ! black --check app tests crossSum.py; then
            echo "::error::Code formatting issues found!"
            echo "Please run 'black app tests crossSum.py' locally and commit."
            exit 1
          fi

      - name: Run flake8 linter
        run: flake8 .

      - name: Run yamllint
        run: |
          if ! yamllint .; then
            echo "::error::YAML linting issues found! Please run 'yamllint .' locally and fix the YAML files."
            exit 1
          fi
