name: Lint Code Quality

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r dev-requirements.txt
          pip install black
      - name: Check code formatting with Black
        run: |
          if ! black --check app tests crossSum.py; then
            echo "::error::Code formatting issues found! Please run 'black app tests crossSum.py' locally and commit the changes."
            exit 1
          fi
      - name: Run flake8
        run: flake8 .
