name: Lint Code Quality

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository code
      - uses: actions/checkout@v4

      # Set up the required Python version
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      # Install dependencies for linting
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r dev-requirements.txt
          pip install black

      # Check code formatting with Black; fail with a clear message if not formatted
      - name: Check code formatting with Black
        run: |
          if ! black --check app tests crossSum.py; then
            echo "::error::Code formatting issues found! Please run 'black app tests crossSum.py' locally and commit the changes."
            exit 1
          fi

      # Run flake8 to check for linting errors
      - name: Run flake8
        run: flake8 .
