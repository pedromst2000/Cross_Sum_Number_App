name: Lint Code Quality

"on":
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  lint-code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      # Note: 'Cache not found' and 'Failed to save cache' warnings are
      # expected and not errors. See GitHub Actions docs for details.
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: >-
            ${{ runner.os }}-pip-${{ hashFiles('**/dev-requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r dev-requirements.txt

      - name: Check code formatting with Black
        run: |
          if ! python -m black --check app tests crossSum.py; then
            echo "::error::Code formatting issues found!"
            echo "Please run 'python -m black app tests crossSum.py' locally and commit."
            exit 1
          fi

      - name: Run flake8 linter
        run: python -m flake8 .

      - name: Run mypy type checks
        run: |
          if ! python -m mypy app tests crossSum.py; then
            echo "::error::Type checking issues found!"
            exit 1
          fi

      - name: Run yamllint
        run: |
          if ! python -m yamllint .; then
            echo "::error::YAML linting issues found!"
            echo "Please run 'python -m yamllint .' locally and fix the YAML files."
            exit 1
          fi
