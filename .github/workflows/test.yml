name: Unit Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository code
      - uses: actions/checkout@v4

      # Set up the required Python version
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      # Install dependencies for linting and testing
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r dev-requirements.txt
          pip install black

      # Set PYTHONPATH so tests can import the app package
      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PWD" >> $GITHUB_ENV

      # Install and start Xvfb to provide a virtual display for GUI (Tkinter) tests
      - name: Install Xvfb for GUI tests
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1024x768x16 &

      # Run pytest with DISPLAY set to :99 so GUI tests can run headlessly
      - name: Run pytest
        run: pytest
        env:
          DISPLAY: :99  # Use the virtual display started by Xvfb
